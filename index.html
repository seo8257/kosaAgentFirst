<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Agent 1팀 환영합니다!</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Pretendard', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #333;
        }
        .welcome-container {
            text-align: center;
            background-color: white;
            padding: 3rem 5rem;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            animation: fadeIn 1s ease-out;
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 1rem;
            font-size: 2.8rem;
        }
        p {
            font-size: 1.25rem;
            color: #555;
            line-height: 1.6;
            margin: 0.5rem 0;
        }
        .highlight {
            color: #4a90e2;
            font-weight: 800;
        }
        .btn {
            display: inline-block;
            margin-top: 2.5rem;
            padding: 0.8rem 2.5rem;
            background-color: #4a90e2;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(74, 144, 226, 0.3);
        }
        .btn:hover {
            background-color: #357abd;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(74, 144, 226, 0.4);
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="welcome-container">
        <h1>🎉 환영합니다! 🎉</h1>
        <p><span class="highlight">AI Agent 1팀</span> 여러분의 합류를 진심으로 환영합니다.</p>
        <p>우리가 함께 만들어갈 놀라운 미래와 혁신적인 프로젝트가 기대됩니다.</p>
        <a href="#" class="btn">힘차게 시작하기</a>
    </div>
</body>
</html>
